<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!-- Declare an apple-touch-icon so Safari/iOS stops auto-probing /apple-touch-icon.png and
		     /apple-touch-icon-precomposed.png (the harmless 404s in the dev console). -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>LayoutForge</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
